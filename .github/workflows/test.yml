name: test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  IMAGOR_BASE_IMAGE: ghcr.io/cshum/imagor-base:vips8.18.2-r5-magick-ffmpeg

jobs:
  test:
    name: Docker Test
    runs-on: ubuntu-24.04
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: builder
          tags: imagorvideo-test
          load: true
          build-args: |
            BASE_IMAGE=${{ env.IMAGOR_BASE_IMAGE }}
            DEV_BASE_IMAGE=${{ env.IMAGOR_BASE_IMAGE }}-dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run tests in Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            imagorvideo-test \
            go test ./... -v

      - name: Commit golden files
        if: github.event_name == 'pull_request'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "test: update golden files"
          file_pattern: "testdata/golden"

      - name: Run coverage in Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            imagorvideo-test \
            go test -coverprofile=profile.cov ./...

      - name: Fix coverage paths
        run: sed -i 's|github.com/cshum/imagorvideo/||g' profile.cov

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: ./profile.cov
